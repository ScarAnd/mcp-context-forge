name: Secret baseline CI decision

on:
  workflow_call:
    inputs:
      workflow-file:
        description: Workflow file name, for example pytest.yml.
        required: true
        type: string
    outputs:
      run-full-ci:
        description: "true when the caller should run full CI."
        value: ${{ jobs.ci-decision.outputs.run-full-ci }}

permissions:
  actions: read
  contents: read

jobs:
  ci-decision:
    name: Full CI decision
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      run-full-ci: ${{ steps.decision.outputs.run-full-ci }}
    steps:
      - name: Decide full CI scope
        id: decision
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          WORKFLOW_FILE: ${{ inputs.workflow-file }}
          EVENT_NAME: ${{ github.event_name }}
          EVENT_JSON: ${{ toJson(github.event) }}
          GITHUB_API_URL: ${{ github.api_url }}
          GITHUB_REPOSITORY_NAME: ${{ github.repository }}
          GITHUB_REF_TYPE_VALUE: ${{ github.ref_type }}
          GITHUB_SHA_VALUE: ${{ github.sha }}
        run: |
          python3 <<'PY'
          import json
          import os
          import sys
          import urllib.parse
          import urllib.request

          ALLOWED_FILE = ".secrets.baseline"
          ZERO_SHA = "0000000000000000000000000000000000000000"

          def append(path, line):
              if path:
                  with open(path, "a", encoding="utf-8") as handle:
                      handle.write(f"{line}\n")

          def api_json(path, query=None):
              url = f"{os.environ['GITHUB_API_URL']}{path}"
              if query:
                  url = f"{url}?{urllib.parse.urlencode(query)}"
              request = urllib.request.Request(
                  url,
                  headers={
                      "Accept": "application/vnd.github+json",
                      "Authorization": f"Bearer {os.environ['GH_TOKEN']}",
                      "X-GitHub-Api-Version": "2022-11-28",
                  },
              )
              with urllib.request.urlopen(request, timeout=20) as response:
                  return json.load(response)

          def commit_data(repo, sha):
              return api_json(f"/repos/{repo}/commits/{sha}")

          def previous_success(repo, workflow_file, sha):
              data = api_json(
                  f"/repos/{repo}/actions/workflows/{workflow_file}/runs",
                  {"head_sha": sha, "status": "success", "per_page": "1"},
              )
              return data.get("total_count", 0) > 0

          def finish(run_full_ci, reason):
              append(os.environ["GITHUB_OUTPUT"], f"run-full-ci={str(run_full_ci).lower()}")
              append(os.environ["GITHUB_OUTPUT"], f"reason={reason}")
              append(os.environ.get("GITHUB_STEP_SUMMARY", ""), "### Full CI decision")
              append(os.environ.get("GITHUB_STEP_SUMMARY", ""), reason)
              print(reason)
              sys.exit(0)

          event = json.loads(os.environ["EVENT_JSON"])

          event_name = os.environ["EVENT_NAME"]
          if event_name not in {"pull_request", "push"}:
              finish(True, f"event {event_name} is not eligible for secrets-baseline-only skipping")
          if os.environ["GITHUB_REF_TYPE_VALUE"] == "tag":
              finish(True, "tag refs are not eligible for secrets-baseline-only skipping")

          if event_name == "pull_request":
              target_sha = event["pull_request"]["head"]["sha"]
              commit_repo = event["pull_request"]["head"]["repo"]["full_name"]
              previous_sha = ""
          else:
              target_sha = event.get("after") or os.environ["GITHUB_SHA_VALUE"]
              commit_repo = os.environ["GITHUB_REPOSITORY_NAME"]
              previous_sha = event.get("before", "")

          try:
              commit = commit_data(commit_repo, target_sha)
              changed_files = [item["filename"] for item in commit.get("files", [])]
              parents = commit.get("parents", [])
              if not previous_sha or previous_sha == ZERO_SHA:
                  previous_sha = parents[0]["sha"] if parents else ""
          except Exception as exc:
              finish(True, f"could not inspect latest commit; run full CI: {exc}")

          if not changed_files:
              finish(True, "latest commit changed no files; run full CI")
          if any(path != ALLOWED_FILE for path in changed_files):
              finish(True, "latest commit is not secrets-baseline-only; run full CI")
          if not previous_sha:
              finish(True, "could not resolve previous commit; run full CI")

          try:
              if previous_success(os.environ["GITHUB_REPOSITORY_NAME"], os.environ["WORKFLOW_FILE"], previous_sha):
                  finish(False, f"latest commit changes only {ALLOWED_FILE}; previous {os.environ['WORKFLOW_FILE']} run passed on {previous_sha}; skip full CI")
          except Exception as exc:
              finish(True, f"could not verify previous workflow success; run full CI: {exc}")

          finish(True, f"latest commit changes only {ALLOWED_FILE}, but no successful previous {os.environ['WORKFLOW_FILE']} run was found for {previous_sha}; run full CI")
          PY
